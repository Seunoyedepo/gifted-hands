<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gifted Hands Contact</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
        <section class="contact">
            <h2>Contact Us</h2>
            <p>We'd love to hear from you. Send us a message below</p>
            <form action="">
        <label for="name">Full Name: </label>
        <input type="text" id="name" name="name" placeholder="Enter your full name" required>
        <label for="email">Email Address: </label>
        <input type="email" id="email" name="email" placeholder="Enter your email address" required>
        <label for="subject">Subject</label>
        <input type="text" id="subject" name="subject">
        <label for="message">Message</label>
        <textarea name="message" id="message" placeholder="Write your message here" rows="6" required></textarea>
        <button type="submit" class="btn">Send Message</button>

        <label>Preferred Role</label>

        <input type="radio" id="outreach" name="role" value="outreach">
        <label for="outreach">Outreach</label>

        <input type="radio" id="fundraising" name="role" value="fundraising">
        <label for="fundraising">fundraising</label>

        <input type="radio" id="logistics" name="role" value="logistics">
        <label for="logistics">Logistics</label>

        <input type="checkbox" id="teaching" name="skills" value="teaching">
        <label for="teaching">Teaching</label>

        <input type="checkbox" id="music" name="skills" value="music">
        <label for="music">Music</label>

        <input type="checkbox" id="cooking" name="skills" value="cooking">
        <label for="cooking">Cooking</label>

        <label for="city">City</label>

        <select name="city" id="city">
            <option value="city">Ibadan</option>
            <option value="city">Lagos</option>
            <option value="city">Abuja</option>
        </select>
        </section>
        </form>

        <section class="location">
            <h2>Visit Our Office</h2>
            <p>Find us using the map below</p>

            <iframe src="" frameborder="0" width="100%" height="400"></iframe>
        </section>
</body>
</html>
